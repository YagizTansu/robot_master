fgo_localization_node:
  ros__parameters:
    # ── Frame IDs ─────────────────────────────────────────────────────────────
    map_frame:  map
    odom_frame: odom
    base_frame: base_footprint

    # ── iSAM2 parameters ──────────────────────────────────────────────────────
    isam2_relinearize_threshold: 0.1
    isam2_relinearize_skip: 10

    # ── Initial pose uncertainty (prior factor sigmas) ────────────────────────
    initial_cov_x:   0.5
    initial_cov_y:   0.5
    initial_cov_yaw: 0.2

    # ── Odometry (BetweenFactor — graph backbone) ─────────────────────────────
    sensors.odometry.enabled:   true
    sensors.odometry.topic:     "/odometry"
    sensors.odometry.noise_x:   0.05   # metre
    sensors.odometry.noise_y:   0.05   # metre
    sensors.odometry.noise_yaw: 0.02   # radyan

    # ── IMU (yaw-only PriorFactor) ────────────────────────────────────────────
    # Kapatmak için: enabled: false
    sensors.imu.enabled:   true
    sensors.imu.topic:     "/imu"
    sensors.imu.noise_yaw: 0.01   # radyan

    # ── Lidar / Scan matcher (ICP PriorFactor) ────────────────────────────────
    # Topic'i değiştirmek için örn: "/scan_merged"
    sensors.lidar.enabled:      true
    sensors.lidar.topic:        "/scan"
    sensors.lidar.noise_x:      0.10   # metre
    sensors.lidar.noise_y:      0.10   # metre
    sensors.lidar.noise_yaw:    0.05   # radyan
    sensors.lidar.min_fitness:  0.30   # ICP: küçük = daha sıkı
    # ICP ayar parametreleri
    sensors.lidar.icp_max_correspondence_dist: 0.5   # metre: eşleşme mesafesi eşiği
    sensors.lidar.icp_max_iterations:          50    # maksimum iterasyon
    sensors.lidar.icp_voxel_leaf_size:         0.05  # metre: voxel downsample

    # ── GPS (opsiyonel — NavSatFix → yerel XY dönüşümü) ─────────────────────────
    # Kullanmak için: enabled: true yapıp datum'ı robotun başlangıç pozisyonuna ayarla.
    # datum_lat / datum_lon: yerel koordinat sisteminin referans noktası (0,0 kabul edilir)
    sensors.gps.enabled:     false
    sensors.gps.topic:       "/gps/fix"
    sensors.gps.datum_lat:   0.0    # referans enlem (başlangıç noktası)
    sensors.gps.datum_lon:   0.0    # referans boylam (başlangıç noktası)
    sensors.gps.noise_x:     2.0    # metre (GPS tipik yatay hata)
    sensors.gps.noise_y:     2.0    # metre
