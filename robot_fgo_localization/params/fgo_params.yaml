fgo_localization_node:
  ros__parameters:
    # ── Frame IDs ─────────────────────────────────────────────────────────────
    map_frame:  map
    odom_frame: odom
    base_frame: base_footprint

    # ── iSAM2 parameters ──────────────────────────────────────────────────────
    isam2_relinearize_threshold: 0.1
    isam2_relinearize_skip: 10

    # ── Initial pose uncertainty (prior factor sigmas) ────────────────────────
    initial_cov_x:   0.5
    initial_cov_y:   0.5
    initial_cov_yaw: 0.2

    # ── Odometry (BetweenFactor — graph backbone) ─────────────────────────────
    sensors.odometry.enabled:   false
    sensors.odometry.topic:     "/odometry"
    sensors.odometry.noise_x:   0.05   # meters
    sensors.odometry.noise_y:   0.05   # meters
    sensors.odometry.noise_yaw: 0.02   # radians

    # ── IMU (yaw-only PriorFactor) ────────────────────────────────────────────
    # To disable: enabled: false
    sensors.imu.enabled:   false
    sensors.imu.topic:     "/imu"
    sensors.imu.noise_yaw: 0.01   # radians

    # ── Lidar / Scan matcher (ICP PriorFactor) ────────────────────────────────
    # To change the topic, e.g.: "/scan_merged"
    sensors.lidar.enabled:      false
    sensors.lidar.topic:        "/scan"
    sensors.lidar.noise_x:      0.10   # meters
    sensors.lidar.noise_y:      0.10   # meters
    sensors.lidar.noise_yaw:    0.05   # radians
    sensors.lidar.min_fitness:  0.30   # ICP: lower = stricter matching
    # ICP tuning parameters
    sensors.lidar.icp_max_correspondence_dist: 0.5   # meters: correspondence distance threshold
    sensors.lidar.icp_max_iterations:          50    # maximum iterations
    sensors.lidar.icp_voxel_leaf_size:         0.05  # meters: voxel downsample size

    # ── GPS (optional — NavSatFix → local XY conversion) ─────────────────────────
    # To enable: set enabled: true and configure datum to the robot's starting position.
    # datum_lat / datum_lon: reference point of the local coordinate system (treated as 0,0)
    sensors.gps.enabled:     false
    sensors.gps.topic:       "/gps/fix"
    sensors.gps.datum_lat:   0.0    # reference latitude (origin point)
    sensors.gps.datum_lon:   0.0    # reference longitude (origin point)
    sensors.gps.noise_x:     2.0    # meters (typical GPS horizontal error)
    sensors.gps.noise_y:     2.0    # meters
