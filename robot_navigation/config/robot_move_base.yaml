bt_navigator:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    default_nav_to_pose_bt_xml: "$(find-pkg-share robot_navigation)/behavior_trees/navigate_w_replanning_simple.xml"
    default_nav_through_poses_bt_xml: ""
    # Custom BT plugin library names
    plugin_lib_names:
      - battery_check_action_bt_node
      - get_charge_station_pose_action_bt_node
      - emergency_stop_action_bt_node
    error_code_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: false
    controller_frequency: 20.0 
    transform_tolerance: 0.5
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.8  # Daha toleranslı
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5  # Daha toleranslı
      movement_time_allowance: 20.0  # Daha uzun süre
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5  # Daha toleranslı
      yaw_goal_tolerance: 0.5  # Daha toleranslı
        # DWB parameters
    FollowPath:
      plugin: "robot_custom_local_planner::CustomLocalPlanner"
      
      # Velocity Limits for Holonomic Motion (m/s and rad/s)
      # X-axis: Forward/Backward
      max_linear_vel_x: 0.5
      min_linear_vel_x: -0.5
      # Y-axis: Lateral (Strafe) - Mecanum/Omni specific
      max_linear_vel_y: 0.5
      min_linear_vel_y: -0.5
      # Rotation
      max_angular_vel: 1.0
      min_angular_vel: -1.0
      
      # Acceleration Limits (m/s^2 and rad/s^2)
      linear_acc_limit_x: 2.5    # Forward/backward acceleration
      linear_acc_limit_y: 2.5    # Lateral acceleration
      angular_acc_limit: 3.2     # Rotational acceleration
      
      # Trajectory Sampling
      # Note: Total trajectories = linear_samples_x * linear_samples_y * angular_samples
      # Example: 7 * 7 * 9 = 441 trajectories per cycle
      linear_samples_x: 7      # Number of forward/backward velocity samples
      linear_samples_y: 7      # Number of lateral velocity samples
      angular_samples: 9       # Number of angular velocity samples
      sim_time: 2.0            # Time to simulate trajectory (seconds) - increased for better path following
      sim_granularity: 0.1     # Time step for simulation (seconds)
      
      # Cost Function Weights
      path_distance_weight: 200.0   # Weight for path alignment (higher = stay closer to path)
      goal_distance_weight: 10.0    # Weight for goal proximity (higher = prefer getting closer to goal)
      obstacle_weight: 1.0          # Weight for obstacle avoidance (higher = stay further from obstacles)
      
      # Tolerances
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      transform_tolerance: 0.5
      
      # Plan Pruning - How far ahead to look on global plan
      prune_plan_distance: 3.0      # Distance (m) to prune global plan for local tracking

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      enable_stamped_cmd_vel: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: true
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.06
      footprint: "[[0.5, 0.45], [0.5, -0.45], [-0.5, -0.45], [-0.5, 0.45]]"
      plugins: ["static_layer", "voxel_layer", "prohibited_layer", "inflation_layer"]
      
      prohibited_layer:
        plugin: "robot_custom_layers/ProhibitedLayer"
        enabled: True
        cost_value: 254
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 1.0
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan1 scan2
        scan1:
          topic: /sick_lidar0/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
        scan2:
          topic: /sick_lidar1/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      enable_stamped_cmd_vel: false
      update_frequency: 1.0  # Çok düşük frekans - minimal kullanım
      publish_frequency: 1.0  # Çok düşük frekans - minimal kullanım
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: true
      footprint: "[[0.5, 0.45], [0.5, -0.45], [-0.5, -0.45], [-0.5, 0.45]]"
      resolution: 0.06
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "prohibited_layer", "inflation_layer"]
      
      prohibited_layer:
        plugin: "robot_custom_layers/ProhibitedLayer"
        enabled: True
        cost_value: 254

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan1 scan2
        scan1:
          topic: /sick_lidar0/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
        scan2:
          topic: /sick_lidar1/scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 1.0
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: false
    #expected_planner_frequency: 20.0
    use_sim_time: true
    planner_plugins: ["GraphPlanner"]
    
    # Graph-based planner - Node ve edge'lerden oluşan graph ile path planning
    GraphPlanner:
      plugin: "robot_graph_based_global_planner::GraphBasedPlanner"
      graph_file_path: "$(find-pkg-share robot_navigation)/graphs/robot_map_graph.json"
      # Node'lar arasında kaç metre aralıklarla pose eklenecek
      interpolation_resolution: 0.1
      # Başlangıç/hedef için en yakın node'u ararken maksimum mesafe (metre)
      max_node_search_radius: 5.0

smoother_server:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: map
    local_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 2.0
    min_rotational_vel: 0.6
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: true

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: false
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    # Mecanum/Omni: [Vx, Vy, W] - Y axis is active for holonomic motion
    max_velocity: [0.5, 0.5, 1.0]      # Match planner limits
    min_velocity: [-0.5, -0.5, -1.0]   # Match planner limits
    max_accel: [2.5, 2.5, 3.2]         # Match planner acceleration limits
    max_decel: [-2.5, -2.5, -3.2]      # Match planner acceleration limits
    odom_topic: "/odometry"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: true
    enable_stamped_cmd_vel: false
    base_frame_id: "base_link"
    odom_frame_id: "map"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    # Polygons represent zone around the robot for "stop", "slowdown" and "limit" action types,
    # and robot footprint for "approach" action type.
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: False
      enabled: True
    observation_sources: ["scan1", "scan2"]
    scan1:
      type: "scan"
      topic: "/sick_lidar0/scan"
      min_height: 0.15
      max_height: 2.0
      enabled: True
    scan2:
      type: "scan"
      topic: "/sick_lidar1/scan"
      min_height: 0.15
      max_height: 2.0
      enabled: True