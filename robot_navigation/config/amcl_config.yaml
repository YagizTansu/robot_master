amcl:
  ros__parameters:
    use_sim_time: True
    # Odom hareket gürültüsü modeli - Lidar kayması için optimize edildi
    alpha1: 0.005  # Rotasyondan kaynaklanan rotasyon gürültüsü (daha da düşürüldü - kayma önleme)
    alpha2: 0.005  # Translasyondan kaynaklanan rotasyon gürültüsü (daha da düşürüldü)
    alpha3: 0.05   # Translasyondan kaynaklanan translasyon gürültüsü (daha da düşürüldü)
    alpha4: 0.005  # Rotasyondan kaynaklanan translasyon gürültüsü (daha da düşürüldü)
    alpha5: 0.005  # Lateral kayma gürültüsü (daha da düşürüldü)
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0  # Düşürüldü - daha kesin eşleştirme için
    laser_max_range: 30.0  # LIDAR-X200 menzili
    laser_min_range: 0.20   # Artırıldı - yakın gürültülü ölçümleri filtrele
    laser_model_type: "likelihood_field"
    max_beams: 240  # Artırıldı - dual lidar için daha iyi kapsama
    max_particles: 8000  # Artırıldı - çok daha hassas lokalizasyon
    min_particles: 2500   # Artırıldı - stabil parçacık sayısı
    odom_frame_id: "odom"
    pf_err: 0.02  # Daha da düşürüldü - çok az hata toleransı
    pf_z: 0.99
    recovery_alpha_fast: 0.001   # Çok düşük - yavaş recovery (kayma önleme)
    recovery_alpha_slow: 0.0005  # Çok düşük - çok yavaş recovery
    resample_interval: 1  # Düşürüldü - daha sık resampling (daha iyi takip)
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.1  # Daha da düşürüldü - çok dar Gaussian (kesin eşleştirme)
    tf_broadcast: true
    transform_tolerance: 0.2  # Daha da sıkı tolerans
    update_min_a: 0.025   # Daha sık açısal güncelleme (~1.5 derece)
    update_min_d: 0.025  # Daha sık doğrusal güncelleme (2.5cm)
    initial_pose_a: 0.0
    initial_cov_aa: 0.05  # Daha da düşük açısal kovaryans (kesin başlangıç)
    initial_cov_xx: 0.05  # Daha da düşük x kovaryans
    initial_cov_yy: 0.05  # Daha da düşük y kovaryans
    z_hit: 0.85   # Hit oranı artırıldı - lidar ölçümlerine daha çok güven
    z_max: 0.02   # Max range olasılığı azaltıldı
    z_rand: 0.10   # Random ölçüm olasılığı azaltıldı (gürültü azaltma)
    z_short: 0.03 # Short hit olasılığı azaltıldı
    scan_topic: scan
    map_topic: map
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
