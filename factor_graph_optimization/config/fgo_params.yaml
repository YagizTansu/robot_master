# ============================================================
#  factor_graph_optimization — FGO Parameter File
#  All parameters used by both fgo_node and scan_matcher_node.
#  NO hardcoded values are present in the C++ source code.
# ============================================================

fgo_node:
  ros__parameters:

    # ── Sensor Toggles ──────────────────────────────────────
    sensors:
      enable_odom:  true
      enable_imu:   true
      enable_lidar: true

    # ── Topic Names ─────────────────────────────────────────
    topics:
      odom_topic:             "/odometry"
      imu_topic:              "/imu"
      scan_match_pose_topic:  "/scan_match_pose"
      initial_pose_topic:     "/initialpose"

    # ── Frame IDs ───────────────────────────────────────────
    frames:
      map_frame:    "map"
      odom_frame:   "odom"
      base_frame:   "base_footprint"
      imu_frame:    "imu_link"

    # ── TF Publishing ───────────────────────────────────────
    tf:
      publish_map_to_odom:    true
      publish_odom_to_base:   true

    # ── Initial Pose ────────────────────────────────────────
    initial_pose:
      x:     0.0
      y:     0.0
      z:     0.0
      roll:  0.0
      pitch: 0.0
      yaw:   0.0

    # ── Noise Models ────────────────────────────────────────
    noise:
      odometry:
        x:     0.05
        y:     0.05
        z:     0.01   # constrained — flat surface
        roll:  0.01   # constrained — flat surface
        pitch: 0.01   # constrained — flat surface
        yaw:   0.05

      imu:
        # Accelerometer white noise (sigma in m/s^2/sqrt(Hz)).
        # Typical MEMS IMU: 0.003-0.02. Higher = trust IMU less.
        accel_sigma:       0.02

        # Gyroscope white noise (sigma in rad/s/sqrt(Hz)).
        # Typical MEMS IMU: 0.0003-0.002. Higher = trust gyro less.
        gyro_sigma:        0.002

        # Accelerometer bias random walk (sigma in m/s^3/sqrt(Hz)).
        # Slower process — keep small.
        accel_bias_sigma:  0.0001

        # Gyroscope bias random walk (sigma in rad/s^2/sqrt(Hz)).
        # Typical MEMS IMU: 1e-4 to 1e-3. Previously was 1e-6 (too tight).
        gyro_bias_sigma:   0.0001

        # Numerical integration noise sigma (trapezoidal discretisation error).
        integration_sigma: 0.0001

        # Bias integration cross-coupling noise (6x6 diagonal, dimensionless scale).
        # Keeps bias random-walk numerically stable inside preintegration.
        bias_acc_omega_int: 1.0e-5

        # Gravity magnitude (m/s^2). Used in ENU Z-up convention.
        gravity:           9.81

    # ── LiDAR gating ────────────────────────────────────────
    lidar:
      gating:
        # Per-scan rotation gate (rad). Each scan is evaluated independently
        # against the instantaneous |dyaw| of its nearest keyframe interval.
        # Must be BELOW keyframe.rotation_threshold (0.02 rad): a rotation
        # keyframe always contributes dyaw >= 0.02, so 0.015 reliably blocks
        # scans attributed to rotation keyframes while never blocking scans
        # attributed to translation keyframes (instantaneous dyaw ~ 0).
        # NDT is unreliable during ANY in-place rotation.
        rotation_gate_rad:   0.015
        # Discard scan poses older than this (sec). Prevents stale scans after a pause.
        max_scan_age_sec:    1.0

    # ── iSAM2 ───────────────────────────────────────────────
    isam2:
      relinearize_threshold:  0.1
      relinearize_skip:       1
      factorization:          "CHOLESKY"   # "CHOLESKY" (fast) or "QR" (more stable when info matrix is ill-conditioned)

    # ── Node timing ─────────────────────────────────────────
    node:
      optimization_rate_hz:   50.0
      max_pending_scans:      10    # max scan-match poses buffered; oldest dropped when exceeded
      max_pending_imu:        2000  # 100 Hz × 20 s safety cap; prevents unbounded growth if optimizer stalls
      max_pending_odom:       500   # generous keyframe buffer cap
      graph_max_size:         2000  # keep at most N key nodes in iSAM2; oldest X/V/B cluster is marginalized when exceeded (0 = unlimited)
      max_path_length:        10000 # cap on /fgo/path pose history; oldest poses dropped when exceeded (0 = unlimited)

    # ── Prior factors on X(0) ───────────────────────────────
    prior:
      pose_pos_sigma:   0.001    # tight prior on initial position  (1 mm)
      pose_rot_sigma:   0.001    # tight prior on initial rotation  (~0.057 deg)
      vel_sigma:        1.0      # generous — robot starts approx. at rest
      bias_accel_sigma: 0.3      # accel bias uncertainty at startup
      bias_gyro_sigma:  0.05     # gyro  bias uncertainty at startup

    # ── Fallback noise when IMU is disabled ─────────────────
    fallback:
      vel_sigma:        0.5
      bias_accel_sigma: 0.01
      bias_gyro_sigma:  0.001

    # ── Keyframe Strategy ───────────────────────────────────
    keyframe:
      translation_threshold:  0.02
      rotation_threshold:     0.02
      max_time_sec:           2.0    # force a keyframe after this interval even when stationary


scan_matcher_node:
  ros__parameters:

    # ── Topics (only those actually subscribed/published) ───
    topics:
      lidar_topic:            "/scan"
      scan_match_pose_topic:  "/scan_match_pose"
      map_topic:              "/map"

    # ── Frame IDs ───────────────────────────────────────────
    frames:
      lidar_frame:  "base_footprint"

    # ── LiDAR noise (written into published covariance msg) ─
    noise:
      lidar:
        x:     0.1
        y:     0.1
        z:     999.0   # 2D scanner provides no z information — keep this DOF unconstrained
        roll:  999.0   # 2D scanner provides no roll information — keep unconstrained
        pitch: 999.0   # 2D scanner provides no pitch information — keep unconstrained
        yaw:   0.1

    # ── Scan Matcher ─────────────────────────────────────────
    scan_matcher:
      type:                    "NDT"
      max_iterations:          50
      max_correspondence_dist: 1.0
      transformation_epsilon:  1.0e-6
      map_z_height:            0.0
      # NDT internal voxel resolution (m). Should be 2-5x the map voxel leaf size.
      # 1.0m is far too coarse for indoor corridors; 0.3m gives wall-level detail.
      ndt_resolution:          0.3
      # Newton gradient-descent step size (m). One of the most impactful NDT
      # convergence parameters. Smaller = more stable, more iterations.
      ndt_step_size:           0.1
      # Discard scan if fitness score > this (applies to both NDT and ICP).
      fitness_score_threshold: 0.5
      # sigma *= (1 + fitness_noise_scale * fitness_score) — applied before publishing
      fitness_noise_scale:     5.0
      # VoxelGrid leaf size for map cloud downsampling (m)
      map_voxel_leaf_size:     0.1
      # VoxelGrid leaf size applied to the source scan before matching (m; 0 = skip)
      # Should be equal to or smaller than map_voxel_leaf_size so densities are symmetric.
      scan_voxel_leaf_size:    0.1
      # Frame written into the published scan-pose message (must match fgo_node map_frame)
      map_frame:               "map"
      # ICP-only: RANSAC outlier rejection (0 iterations = disabled)
      icp_ransac_iterations:   5
      icp_ransac_threshold:    0.05  # inlier distance threshold (m)
